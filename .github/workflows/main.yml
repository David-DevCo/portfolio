name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '17'

      - name: Install dependencies
        run: npm install --force

      - name: Build
        run: npm run build

      - name: List Files
        run: ls && cd build && ls 
      
      - name: Configure AWS CLI Credentials
        run: |
          mkdir -p ~/.aws
          # Set the region in the config file
          echo "[default]" > ~/.aws/config
          echo "region = us-east-2" >> ~/.aws/config
          
          # Set the active keys in the credentials file
          echo "[default]" > ~/.aws/credentials
          echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
      
      - name: aws s3 delete bucket archives
        run: aws s3 rm s3://codejar.me --recursive
      
      - name: aws s3 upload archives
        run: aws s3 cp ./build s3://codejar.me --recursive